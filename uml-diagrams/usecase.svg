@startuml
left to right direction

actor User

rectangle "Wildlife Explorer" {
  usecase "Search Trails" as UC1
  usecase "View Trail Info" as UC2
  usecase "Add New Trail" as UC3
  usecase "Edit Trail Info" as UC4
  usecase "Rate Trail" as UC5
  usecase "Add Wildlife Sighting" as UC6
}

User - -> UC1
User - -> UC2
User - -> UC3
User - -> UC4
User - -> UC5
User - -> UC6

UC1 - -> UC2 : <<include>>
@enduml

