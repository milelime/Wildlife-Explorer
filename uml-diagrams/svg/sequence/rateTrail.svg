 x2="244" y1="540.1094" y2="540.1094"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacingAndGlyphs" textLength="194" x="39" y="535.0435">updated average rating shown</text><!--MD5=[6d02320aeeb3f0985c392a7f24b87088]
@startuml

skinparam BackgroundColor white
skinparam shadowing false
skinparam defaultFontName SansSerif
skinparam ArrowColor black
skinparam ArrowThickness 1

skinparam classAttributeIconSize 0
skinparam class {
  BackgroundColor white
  BorderColor black
  FontColor black
}
skinparam package {
  BackgroundColor white
  BorderColor black
  FontColor black
}
skinparam stereotype {
  BackgroundColor white
  FontColor black
}

skinparam sequenceMessageAlign center
skinparam LifeLineBorderColor black
skinparam LifeLineBackgroundColor white
skinparam sequence {
  ArrowColor black
  LifeLineBorderColor black
}
skinparam participant {
  BackgroundColor white
  BorderColor black
  FontColor black
}
skinparam actor {
  BackgroundColor white
  BorderColor black
  FontColor black
}
skinparam boundary {
  BackgroundColor white
  BorderColor black
  FontColor black
}
skinparam control {
  BackgroundColor white
  BorderColor black
  FontColor black
}
skinparam database {
  BackgroundColor white
  BorderColor black
  FontColor black
}
skinparam entity {
  BackgroundColor white
  BorderColor black
  FontColor black
}
skinparam collections {
  BackgroundColor white
  BorderColor black
  FontColor black
}
skinparam note {
  BackgroundColor white
  BorderColor black
  FontColor black
}

title Rate Existing Trail (0-10)

actor User
boundary TrailPanel
control TrailService
database Database

User -> TrailPanel : open trail detail

TrailPanel -> TrailService : getTrail(trailId)
TrailService -> Database : fetchTrailById(trailId)
Database - -> TrailService : trail
TrailService - -> TrailPanel : trail

TrailPanel - -> User : show trail info

User -> TrailPanel : click "Rate"
User -> TrailPanel : click score button (0-10)

TrailPanel -> TrailService : rateTrail(trailId, score)
TrailService -> Database : insertRating(trailId, score)
Database -> Database : save()
Database - -> TrailService : ok
TrailService - -> TrailPanel : ok

TrailPanel - -> User : updated average rating shown

@enduml

