@startuml

skinparam BackgroundColor white
skinparam shadowing false
skinparam defaultFontName SansSerif
skinparam ArrowColor black
skinparam ArrowThickness 1

skinparam classAttributeIconSize 0
skinparam class {
  BackgroundColor white
  BorderColor black
  FontColor black
}
skinparam package {
  BackgroundColor white
  BorderColor black
  FontColor black
}
skinparam stereotype {
  BackgroundColor white
  FontColor black
}

skinparam sequenceMessageAlign center
skinparam LifeLineBorderColor black
skinparam LifeLineBackgroundColor white
skinparam sequence {
  ArrowColor black
  LifeLineBorderColor black
}
skinparam participant {
  BackgroundColor white
  BorderColor black
  FontColor black
}
skinparam actor {
  BackgroundColor white
  BorderColor black
  FontColor black
}
skinparam boundary {
  BackgroundColor white
  BorderColor black
  FontColor black
}
skinparam control {
  BackgroundColor white
  BorderColor black
  FontColor black
}
skinparam database {
  BackgroundColor white
  BorderColor black
  FontColor black
}
skinparam entity {
  BackgroundColor white
  BorderColor black
  FontColor black
}
skinparam collections {
  BackgroundColor white
  BorderColor black
  FontColor black
}
skinparam note {
  BackgroundColor white
  BorderColor black
  FontColor black
}

title Rate Existing Trail (0-10)

actor "End User" as EU
boundary TrailPanel
control TrailService
database Database

EU -> TrailPanel : open trail detail

TrailPanel -> TrailService : getTrail(trailId)
TrailService -> Database : fetchTrailById(trailId)
Database - -> TrailService : trail
TrailService - -> TrailPanel : trail

TrailPanel - -> EU : show trail info

EU -> TrailPanel : click "Rate"
EU -> TrailPanel : click score button (0-10)

TrailPanel -> TrailService : rateTrail(trailId, score)
TrailService -> Database : insertRating(trailId, score)
Database -> Database : save()
Database - -> TrailService : ok
TrailService - -> TrailPanel : ok

TrailPanel - -> EU : updated average rating shown

@enduml

