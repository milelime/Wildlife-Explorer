@startuml

skinparam BackgroundColor white
skinparam shadowing false
skinparam defaultFontName SansSerif
skinparam ArrowColor black
skinparam ArrowThickness 1

skinparam classAttributeIconSize 0
skinparam class {
  BackgroundColor white
  BorderColor black
  FontColor black
}
skinparam package {
  BackgroundColor white
  BorderColor black
  FontColor black
}
skinparam stereotype {
  BackgroundColor white
  FontColor black
}

skinparam sequenceMessageAlign center
skinparam LifeLineBorderColor black
skinparam LifeLineBackgroundColor white
skinparam sequence {
  ArrowColor black
  LifeLineBorderColor black
}
skinparam participant {
  BackgroundColor white
  BorderColor black
  FontColor black
}
skinparam actor {
  BackgroundColor white
  BorderColor black
  FontColor black
}
skinparam boundary {
  BackgroundColor white
  BorderColor black
  FontColor black
}
skinparam control {
  BackgroundColor white
  BorderColor black
  FontColor black
}
skinparam database {
  BackgroundColor white
  BorderColor black
  FontColor black
}
skinparam entity {
  BackgroundColor white
  BorderColor black
  FontColor black
}
skinparam collections {
  BackgroundColor white
  BorderColor black
  FontColor black
}
skinparam note {
  BackgroundColor white
  BorderColor black
  FontColor black
}

title Edit Existing Trail Information

actor "End User" as EU
boundary SearchPanel
boundary TrailPanel
control TrailService
database Database

EU -> SearchPanel : search / select trail
EU -> TrailPanel : open trail (from Search or list)

TrailPanel -> TrailService : getTrail(trailId)
TrailService -> Database : fetchTrailById(trailId)
Database - -> TrailService : trail
TrailService - -> TrailPanel : trail

TrailPanel - -> EU : display trail + wildlife + images

EU -> TrailPanel : click "Edit", change name/length/elevation
TrailPanel -> TrailService : editTrail(name, trailId, length, elevation)

TrailService -> TrailService : update Trail fields
TrailService -> Database : save()

Database - -> TrailService : ok
TrailService - -> TrailPanel : ok

TrailPanel - -> EU : refreshed trail fields

@enduml

