 style="stroke: #000000; stroke-width: 1.0; stroke-dasharray: 2.0,2.0;" x1="32" x2="245" y1="394.4453" y2="394.4453"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacingAndGlyphs" textLength="127" x="73" y="389.3794">wildlife list refreshes</text><!--MD5=[6ff88d7395a8582abaa154c1196f1a7c]
@startuml

skinparam BackgroundColor white
skinparam shadowing false
skinparam defaultFontName SansSerif
skinparam ArrowColor black
skinparam ArrowThickness 1

skinparam classAttributeIconSize 0
skinparam class {
  BackgroundColor white
  BorderColor black
  FontColor black
}
skinparam package {
  BackgroundColor white
  BorderColor black
  FontColor black
}
skinparam stereotype {
  BackgroundColor white
  FontColor black
}

skinparam sequenceMessageAlign center
skinparam LifeLineBorderColor black
skinparam LifeLineBackgroundColor white
skinparam sequence {
  ArrowColor black
  LifeLineBorderColor black
}
skinparam participant {
  BackgroundColor white
  BorderColor black
  FontColor black
}
skinparam actor {
  BackgroundColor white
  BorderColor black
  FontColor black
}
skinparam boundary {
  BackgroundColor white
  BorderColor black
  FontColor black
}
skinparam control {
  BackgroundColor white
  BorderColor black
  FontColor black
}
skinparam database {
  BackgroundColor white
  BorderColor black
  FontColor black
}
skinparam entity {
  BackgroundColor white
  BorderColor black
  FontColor black
}
skinparam collections {
  BackgroundColor white
  BorderColor black
  FontColor black
}
skinparam note {
  BackgroundColor white
  BorderColor black
  FontColor black
}

title Remove Wildlife from Trail (species stays in catalog)

actor User
boundary TrailPanel
control TrailService
database Database

User -> TrailPanel : click "Remove" on wildlife block

TrailPanel -> User : confirm dialog

User -> TrailPanel : confirm

TrailPanel -> TrailService : removeWildlifeFromTrail(trailId, wildlifeId)
TrailService -> Database : removeWildlifeFromTrail(...)
Database -> Database : save()
Database - -> TrailService : ok
TrailService - -> TrailPanel : ok

TrailPanel - -> User : wildlife list refreshes

@enduml

