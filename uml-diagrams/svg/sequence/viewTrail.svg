@startuml

skinparam BackgroundColor white
skinparam shadowing false
skinparam defaultFontName SansSerif
skinparam ArrowColor black
skinparam ArrowThickness 1

skinparam classAttributeIconSize 0
skinparam class {
  BackgroundColor white
  BorderColor black
  FontColor black
}
skinparam package {
  BackgroundColor white
  BorderColor black
  FontColor black
}
skinparam stereotype {
  BackgroundColor white
  FontColor black
}

skinparam sequenceMessageAlign center
skinparam LifeLineBorderColor black
skinparam LifeLineBackgroundColor white
skinparam sequence {
  ArrowColor black
  LifeLineBorderColor black
}
skinparam participant {
  BackgroundColor white
  BorderColor black
  FontColor black
}
skinparam actor {
  BackgroundColor white
  BorderColor black
  FontColor black
}
skinparam boundary {
  BackgroundColor white
  BorderColor black
  FontColor black
}
skinparam control {
  BackgroundColor white
  BorderColor black
  FontColor black
}
skinparam database {
  BackgroundColor white
  BorderColor black
  FontColor black
}
skinparam entity {
  BackgroundColor white
  BorderColor black
  FontColor black
}
skinparam collections {
  BackgroundColor white
  BorderColor black
  FontColor black
}
skinparam note {
  BackgroundColor white
  BorderColor black
  FontColor black
}

title View Trail Information

actor User
boundary SearchPanel
boundary TrailPanel
control TrailService
database Database

User -> SearchPanel : select trail, Open

SearchPanel -> TrailPanel : setTrail(trailId) / open detail

TrailPanel -> TrailService : getTrail(trailId)
TrailService -> Database : fetchTrailById(trailId)
Database - -> TrailService : trail

note right of TrailService
  Trail already contains wildlifeList
  (joined from catalog when loaded).
end note

TrailService - -> TrailPanel : trail

TrailPanel - -> User : display trail metadata,\ntrail images, wildlife text + thumbnails

@enduml

