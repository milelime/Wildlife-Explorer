.5,181.5156,364.5,177.5156" style="stroke: #000000; stroke-width: 1.0;"/><line style="stroke: #000000; stroke-width: 1.0;" x1="174.5" x2="366.5" y1="177.5156" y2="177.5156"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacingAndGlyphs" textLength="174" x="186.5" y="172.4497">setTrail(trailId) / open detail</text><polygon fill="#000000" points="476.5,202.6484,486.5,206.6484,476.5,210.6484,480.5,206.6484" style="stroke: #000000; stroke-width: 1.0;"/><line style="stroke: #000000; stroke-width: 1.0;" x1="372.5" x2="482.5" y1="206.6484" y2="206.6484"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacingAndGlyphs" textLength="92" x="384.5" y="201.5825">getTrail(trailId)</text><polygon fill="#000000" points="630.5,231.7813,640.5,235.7813,630.5,239.7813,634.5,235.7813" style="stroke: #000000; stroke-width: 1.0;"/><line style="stroke: #000000; stroke-width: 1.0;" x1="488.5" x2="636.5" y1="235.7813" y2="235.7813"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacingAndGlyphs" textLength="130" x="500.5" y="230.7153">fetchTrailById(trailId)</text><polygon fill="#000000" points="499.5,260.9141,489.5,264.9141,499.5,268.9141,495.5,264.9141" style="stroke: #000000; stroke-width: 1.0;"/><line style="stroke: #000000; stroke-width: 1.0; stroke-dasharray: 2.0,2.0;" x1="493.5" x2="641.5" y1="264.9141" y2="264.9141"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacingAndGlyphs" textLength="24" x="553.5" y="259.8481">trail</text><path d="M493,277.9141 L493,317.9141 L735,317.9141 L735,287.9141 L725,277.9141 L493,277.9141 " fill="#FFFFFF" style="stroke: #000000; stroke-width: 1.0;"/><path d="M725,277.9141 L725,287.9141 L735,287.9141 L725,277.9141 " fill="#FFFFFF" style="stroke: #000000; stroke-width: 1.0;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacingAndGlyphs" textLength="202" x="499" y="294.981">Trail already contains wildlifeList<