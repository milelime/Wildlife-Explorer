@startuml

skinparam BackgroundColor white
skinparam shadowing false
skinparam defaultFontName SansSerif
skinparam ArrowColor black
skinparam ArrowThickness 1

skinparam classAttributeIconSize 0
skinparam class {
  BackgroundColor white
  BorderColor black
  FontColor black
}
skinparam package {
  BackgroundColor white
  BorderColor black
  FontColor black
}
skinparam stereotype {
  BackgroundColor white
  FontColor black
}

skinparam sequenceMessageAlign center
skinparam LifeLineBorderColor black
skinparam LifeLineBackgroundColor white
skinparam sequence {
  ArrowColor black
  LifeLineBorderColor black
}
skinparam participant {
  BackgroundColor white
  BorderColor black
  FontColor black
}
skinparam actor {
  BackgroundColor white
  BorderColor black
  FontColor black
}
skinparam boundary {
  BackgroundColor white
  BorderColor black
  FontColor black
}
skinparam control {
  BackgroundColor white
  BorderColor black
  FontColor black
}
skinparam database {
  BackgroundColor white
  BorderColor black
  FontColor black
}
skinparam entity {
  BackgroundColor white
  BorderColor black
  FontColor black
}
skinparam collections {
  BackgroundColor white
  BorderColor black
  FontColor black
}
skinparam note {
  BackgroundColor white
  BorderColor black
  FontColor black
}

title Add New Trail

actor "End User" as EU
boundary SearchPanel
boundary TrailPanel
control TrailService
database Database

EU -> SearchPanel : click "New Trail"
EU -> SearchPanel : enter name, length, elevation
SearchPanel -> SearchPanel : nextTrailId()
SearchPanel -> TrailService : createTrail(name, id, length, elevation)
TrailService -> Database : insertTrail(trail)
Database -> Database : save()
Database - -> TrailService : ok
TrailService - -> SearchPanel : ok

SearchPanel - -> EU : list refreshes (new trail)

opt add photos later
  EU -> TrailPanel : open trail, "Add Trail Image"
  TrailPanel -> TrailService : saveTrail()
  TrailService -> Database : save()
end

@enduml

