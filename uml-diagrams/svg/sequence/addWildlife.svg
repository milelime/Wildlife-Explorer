@startuml

skinparam BackgroundColor white
skinparam shadowing false
skinparam defaultFontName SansSerif
skinparam ArrowColor black
skinparam ArrowThickness 1

skinparam classAttributeIconSize 0
skinparam class {
  BackgroundColor white
  BorderColor black
  FontColor black
}
skinparam package {
  BackgroundColor white
  BorderColor black
  FontColor black
}
skinparam stereotype {
  BackgroundColor white
  FontColor black
}

skinparam sequenceMessageAlign center
skinparam LifeLineBorderColor black
skinparam LifeLineBackgroundColor white
skinparam sequence {
  ArrowColor black
  LifeLineBorderColor black
}
skinparam participant {
  BackgroundColor white
  BorderColor black
  FontColor black
}
skinparam actor {
  BackgroundColor white
  BorderColor black
  FontColor black
}
skinparam boundary {
  BackgroundColor white
  BorderColor black
  FontColor black
}
skinparam control {
  BackgroundColor white
  BorderColor black
  FontColor black
}
skinparam database {
  BackgroundColor white
  BorderColor black
  FontColor black
}
skinparam entity {
  BackgroundColor white
  BorderColor black
  FontColor black
}
skinparam collections {
  BackgroundColor white
  BorderColor black
  FontColor black
}
skinparam note {
  BackgroundColor white
  BorderColor black
  FontColor black
}

title Add Wildlife to a Trail (new species or existing catalog)

actor "End User" as EU
boundary TrailPanel
boundary WildlifePanel
control TrailService
database Database

EU -> TrailPanel : open trail, "Add Wildlife"
EU -> TrailPanel : choose "from list" or "create new"

alt attach existing species
  TrailPanel -> TrailService : listAllWildlife()
  TrailService -> Database : getAllWildlife()
  Database - -> TrailService : catalog
  EU -> TrailPanel : pick wildlife not yet on trail
  TrailPanel -> TrailService : attachExistingWildlifeToTrail(trailId, wildlifeId)
  TrailService -> Database : attachExistingWildlifeToTrail(...)
  Database -> Database : save()
else create new species
  TrailPanel -> WildlifePanel : open form (trail context)
  EU -> WildlifePanel : enter name, description, notes,\n optionally choose photo
  WildlifePanel -> TrailService : addWildlife(trailId, wildlife)
  TrailService -> Database : insertWildlife(...)
  Database -> Database : save()
  WildlifePanel - -> TrailPanel : return to trail view
end

TrailPanel - -> EU : wildlife list refreshes

@enduml

